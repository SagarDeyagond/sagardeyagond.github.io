  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

342d;\n    --pastel-yellow:#3a311a;\n    --pastel-yellow-deep: #564a28;\n    --pastel-blue:  #1f2a40;\n    --pastel-blue-deep: #2e3e5c;\n    --pastel-coral: #3a2820;\n    --pastel-lilac: #2d273a;\n\n    --accent:       #8ab4f8;\n    --accent-on:    #1f1f1f;\n  }\n\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }\n  body {\n    background: var(--bg);\n    color: var(--text);\n    font-family: var(--body);\n    font-size: 16px;\n    line-height: 1.55;\n    -webkit-font-smoothing: antialiased;\n    -webkit-tap-highlight-color: transparent;\n    transition: background 0.3s, color 0.3s;\n    overflow-x: hidden;\n  }\n  img, svg { max-width: 100%; }\n  h1, h2, h3, h4, p { overflow-wrap: break-word; word-wrap: break-word; }\n\n  /* ── NAV ── */\n  nav {\n    position: sticky;\n    top: 0;\n    z-index: 100;\n    background: var(--bg);\n    border-bottom: 1px solid var(--border);\n    padding: 0 40px;\n    height: 64px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n  }\n  .nav-logo {\n    display: flex; align-items: center; gap: 10px;\n    text-decoration: none;\n    color: var(--text);\n    flex-shrink: 0;\n  }\n  .nav-logo-mark {\n    width: 32px; height: 32px;\n    border-radius: 50%;\n    background:\n      conic-gradient(from 0deg, var(--google-blue) 0deg 90deg, var(--google-red) 90deg 180deg, var(--google-yellow) 180deg 270deg, var(--google-green) 270deg 360deg);\n    position: relative;\n    flex-shrink: 0;\n  }\n  .nav-logo-mark::after {\n    content: '';\n    position: absolute;\n    inset: 7px;\n    border-radius: 50%;\n    background: var(--bg);\n  }\n  .nav-logo-mark::before {\n    content: 'S';\n    position: absolute;\n    inset: 0;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-family: var(--sans);\n    font-weight: 700;\n    font-size: 14px;\n    color: var(--text);\n    z-index: 1;\n  }\n  .nav-logo-text {\n    display: flex;\n    flex-direction: column;\n    line-height: 1.1;\n    white-space: nowrap;\n  }\n  .nav-logo-text .n1 {\n    font-size: 16px;\n    font-weight: 500;\n    color: var(--text);\n  }\n  .nav-logo-text .n2 {\n    font-size: 11px;\n    font-weight: 400;\n    color: var(--text-muted);\n    margin-top: 1px;\n  }\n  .nav-links {\n    display: flex; gap: 8px; list-style: none;\n  }\n  .nav-links a {\n    font-size: 14px;\n    color: var(--text-mid);\n    text-decoration: none;\n    padding: 8px 16px;\n    border-radius: var(--radius-pill);\n    transition: background 0.15s, color 0.15s;\n    font-weight: 400;\n  }\n  .nav-links a:hover { background: var(--bg-section); color: var(--text); }\n  .nav-right { display: flex; gap: 12px; align-items: center; }\n  .theme-toggle {\n    width: 40px; height: 40px;\n    border-radius: 50%;\n    border: 1px solid var(--border);\n    background: var(--bg);\n    cursor: pointer;\n    display: flex; align-items: center; justify-content: center;\n    transition: background 0.15s, border-color 0.15s;\n  }\n  .theme-toggle:hover { background: var(--bg-section); }\n  .theme-toggle svg { width: 18px; height: 18px; color: var(--text-mid); }\n  html.dark .theme-toggle .sun { display: block; }\n  html.dark .theme-toggle .moon { display: none; }\n  html:not(.dark) .theme-toggle .sun { display: none; }\n  html:not(.dark) .theme-toggle .moon { display: block; }\n  .nav-cta {\n    padding: 10px 22px;\n    background: var(--text);\n    color: var(--bg);\n    border-radius: var(--radius-pill);\n    text-decoration: none;\n    font-size: 14px;\n    font-weight: 500;\n    transition: background 0.2s;\n    border: none;\n    cursor: pointer;\n    font-family: var(--sans);\n  }\n  .nav-cta:hover { background: var(--accent); color: var(--accent-on); }\n\n  /* ── HERO (Option A — asymmetric split with portrait) ── */\n  #hero {\n    background: var(--pastel-mint);\n    padding: 80px 40px 72px;\n    border-radius: 0 0 var(--radius-section) var(--radius-section);\n    overflow: hidden;\n    position: relative;\n  }\n  .hero-inner {\n    max-width: 1180px;\n    margin: 0 auto;\n    display: grid;\n    grid-template-columns: 1.15fr 0.85fr;\n    gap: 64px;\n    align-items: center;\n  }\n  .hero-text {\n    display: flex;\n    flex-direction: column;\n    align-items: flex-start;\n    gap: 24px;\n  }\n  .hero-eyebrow {\n    font-size: 14px;\n    color: var(--text-mid);\n    font-weight: 500;\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    padding: 6px 14px;\n    background: var(--surface);\n    border-radius: var(--radius-pill);\n    border: 1px solid var(--border);\n  }\n  .hero-eyebrow .live-dot {\n    width: 8px; height: 8px;\n    border-radius: 50%;\n    background: var(--google-green);\n    animation: pulse-soft 2s ease-in-out infinite;\n  }\n  .hero-headline {\n    font-family: var(--sans);\n    font-size: clamp(40px, 5.2vw, 64px);\n    font-weight: 500;\n    line-height: 1.04;\n    letter-spacing: -0.025em;\n    color: var(--text);\n    margin: 0;\n  }\n  .hero-headline .accent {\n    color: var(--google-blue);\n  }\n  html.dark .hero-headline .accent { color: var(--accent); }\n  .hero-sub {\n    font-size: 18px;\n    color: var(--text-mid);\n    line-height: 1.55;\n    margin: 0;\n    max-width: 520px;\n  }\n  .hero-cta { display: flex; gap: 12px; flex-wrap: wrap; }\n\n  /* Portrait column */\n  .hero-photo-wrap {\n    position: relative;\n    width: 100%;\n  }\n  .hero-photo-frame {\n    aspect-ratio: 4 / 5;\n    width: 100%;\n    max-width: 420px;\n    margin: 0 auto;\n    border-radius: var(--radius-card);\n    overflow: hidden;\n    box-shadow: 0 16px 48px rgba(0,0,0,0.12);\n    position: relative;\n    z-index: 1;\n    background: var(--surface);\n  }\n  html.dark .hero-photo-frame { box-shadow: 0 16px 48px rgba(0,0,0,0.45); }\n  .hero-photo-frame img {\n    width: 100%;\n    height: 100%;\n    object-fit: cover;\n    display: block;\n  }\n  /* Placeholder for when no photo is supplied yet */\n  .hero-photo-placeholder {\n    width: 100%;\n    height: 100%;\n    background:\n      repeating-linear-gradient(45deg, #2a3137 0 2px, transparent 2px 14px),\n      linear-gradient(180deg, #3c4248 0%, #2a3137 100%);\n    color: rgba(255,255,255,0.85);\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    gap: 10px;\n  }\n  .hero-photo-placeholder::after {\n    content: '';\n    position: absolute;\n    inset: 0;\n    background: radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.08) 0%, transparent 60%);\n    pointer-events: none;\n  }\n  .hero-photo-placeholder .pp-label {\n    font-family: 'Roboto', monospace;\n    font-size: 12px;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    background: rgba(0,0,0,0.5);\n    padding: 6px 12px;\n    border-radius: 6px;\n    z-index: 1;\n  }\n  .hero-photo-placeholder .pp-meta {\n    font-family: 'Roboto', monospace;\n    font-size: 10px;\n    color: rgba(255,255,255,0.55);\n    text-align: center;\n    padding: 0 16px;\n    z-index: 1;\n  }\n  /* Decorative dots — pure CSS, no SVG */\n  .hero-photo-deco-1 {\n    position: absolute;\n    top: -18px;\n    left: -18px;\n    width: 64px;\n    height: 64px;\n    border-radius: 50%;\n    background: var(--google-yellow);\n    z-index: 2;\n  }\n  .hero-photo-deco-2 {\n    position: absolute;\n    bottom: -22px;\n    right: -22px;\n    width: 96px;\n    height: 96px;\n    border-radius: 50%;\n    background: var(--google-red);\n    opacity: 0.9;\n    z-index: 0;\n  }\n\n  .hero-pills {\n    grid-column: 1 / -1;\n    margin-top: 32px;\n    display: flex;\n    flex-wrap: wrap;\n    gap: 10px;\n  }\n  .hero-pill {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    padding: 8px 16px;\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: var(--radius-pill);\n    font-size: 13px;\n    font-weight: 500;\n ting engagements\n      <\u002Fspan>\n      <h1 class=\"hero-headline\">\n        Helping AI reach<br>\n        <span class=\"accent\">the real world<\u002Fspan>\n      <\u002Fh1>\n      <p class=\"hero-sub\">\n        11+ years building production-grade AI across medical imaging, ADAS, and agricultural CV. Independent consultant working with healthtech and applied-AI teams to take research-grade systems from notebook to deployment.\n      <\u002Fp>\n      <div class=\"hero-cta\">\n        <a href=\"#\" onclick=\"revealEmail(event)\" class=\"btn-primary\">\n          Start a conversation\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M3 8h10M9 4l4 4-4 4\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n        <a href=\"#patents\" class=\"btn-ghost\">View patents<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hero-photo-wrap\">\n      <div class=\"hero-photo-deco-2\"><\u002Fdiv>\n      <div class=\"hero-photo-frame\">\n        <!-- Drop in: <img src=\"sagar.jpg\" alt=\"Sagar Deyagond\"> -->\n        <div class=\"hero-photo-placeholder\">\n          <span class=\"pp-label\">Headshot<\u002Fspan>\n          <span class=\"pp-meta\">4:5 portrait · neutral bg · eyes upper third<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hero-photo-deco-1\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hero-pills\">\n      <span class=\"hero-pill\"><span class=\"pill-dot blue\"><\u002Fspan>Computer Vision Systems<\u002Fspan>\n      <span class=\"hero-pill\"><span class=\"pill-dot red\"><\u002Fspan>Healthcare AI<\u002Fspan>\n      <span class=\"hero-pill\"><span class=\"pill-dot yellow\"><\u002Fspan>ADAS &amp; Autonomous<\u002Fspan>\n      <span class=\"hero-pill\"><span class=\"pill-dot green\"><\u002Fspan>Deep Learning R&amp;D<\u002Fspan>\n      <span class=\"hero-pill\"><span class=\"pill-dot blue\"><\u002Fspan>Patent Strategy<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n<!-- ── ABOUT / MISSION ── -->\n<div id=\"about\" class=\"pastel-block pink\">\n  <div class=\"section-inner\" style=\"max-width: 900px; margin: 0 auto;\">\n    <p style=\"font-size:12px; font-weight:600; color: var(--google-red); letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 16px;\">My mission<\u002Fp>\n    <h2 class=\"section-title\" style=\"font-size: clamp(28px, 4vw, 44px);\">My work is driven by a simple yet powerful goal: take the AI capabilities researchers dream up and ship them, so they actually reach patients, drivers, and fields.<\u002Fh2>\n    <p class=\"section-sub\" style=\"margin-top: 24px; max-width: 720px;\">\n      Since my first computer vision PoC in 2015, I've been obsessed with one question — <strong style=\"color: var(--text); font-weight: 500;\">how do you build AI that survives the real world?<\u002Fstrong> Cracking that has become my life's work, across Qualcomm, Becton Dickinson R&amp;D, Visteon, and now a portfolio of independent consulting engagements.\n    <\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ── SPOTLIGHT (recent work) ── -->\n<div class=\"section\">\n  <div class=\"section-inner\">\n    <div class=\"spotlight-grid\">\n\n      <a href=\"#partners\" class=\"spotlight\">\n        <div class=\"spotlight-img\" style=\"background: var(--pastel-mint);\">\n          <svg viewBox=\"0 0 400 250\" xmlns=\"http://www.w3.org/2000/svg\">\n            <rect width=\"400\" height=\"250\" fill=\"#d3edee\"><\u002Frect>\n            <g transform=\"translate(200 125)\">\n              <path d=\"M-80 0 L-40 -20 L0 0 L40 -30 L80 -10\" stroke=\"#1e8e3e\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n              <circle cx=\"-40\" cy=\"-20\" r=\"5\" fill=\"#ea4335\"><\u002Fcircle>\n              <circle cx=\"0\" cy=\"0\" r=\"5\" fill=\"#ea4335\"><\u002Fcircle>\n              <circle cx=\"40\" cy=\"-30\" r=\"5\" fill=\"#ea4335\"><\u002Fcircle>\n              <circle cx=\"80\" cy=\"-10\" r=\"5\" fill=\"#ea4335\"><\u002Fcircle>\n              <text x=\"0\" y=\"50\" text-anchor=\"middle\" font-family=\"DM Sans\" font-size=\"14\" fill=\"#202124\" font-weight=\"500\">ECG · HRV · BP<\u002Ftext>\n            <\u002Fg>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"spotlight-body\">\n          <p class=\"spotlight-label\">Spotlight<\u002Fp>\n          <h3 class=\"spotlight-title\">Aoknos — cardiovascular biosignal AI<\u002Fh3>\n          <p class=\"spotlight-desc\">Building AI models for ECG/PPG denoising, HRV analysis, and real-time non-invasive blood pressure risk scoring.<\u002Fp>\n          <span class=\"spotlight-link\">Learn more →<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <a href=\"#partners\" class=\"spotlight\">\n        <div class=\"spotlight-img\" style=\"background: var(--pastel-blue);\">\n          <svg viewBox=\"0 0 400 250\" xmlns=\"http://www.w3.org/2000/svg\">\n            <rect width=\"400\" height=\"250\" fill=\"#dde7fb\"><\u002Frect>\n            <g transform=\"translate(200 125)\">\n              <circle r=\"60\" fill=\"none\" stroke=\"#1a73e8\" stroke-width=\"2\" opacity=\"0.3\"><\u002Fcircle>\n              <circle r=\"40\" fill=\"none\" stroke=\"#1a73e8\" stroke-width=\"2\" opacity=\"0.5\"><\u002Fcircle>\n              <circle r=\"20\" fill=\"#1a73e8\"><\u002Fcircle>\n              <path d=\"M-70 0 Q0 -50 70 0 Q0 50 -70 0\" fill=\"none\" stroke=\"#1a73e8\" stroke-width=\"1.5\" opacity=\"0.4\"><\u002Fpath>\n              <text x=\"0\" y=\"80\" text-anchor=\"middle\" font-family=\"DM Sans\" font-size=\"14\" fill=\"#202124\" font-weight=\"500\">Remote Sensing · Geospatial<\u002Ftext>\n            <\u002Fg>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"spotlight-body\">\n          <p class=\"spotlight-label\">Spotlight<\u002Fp>\n          <h3 class=\"spotlight-title\">Smart Bhujal — water  style=\"padding-top: 40px;\">\n  <div class=\"section-inner\">\n    <p style=\"font-size:12px; font-weight:600; color: var(--google-blue); letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 16px;\">Services<\u002Fp>\n    <h2 class=\"section-title\">Helping teams take AI<br>from research to real world<\u002Fh2>\n    <p class=\"section-sub\">Four ways I help applied-AI teams ship faster. Engagements scale from a 4-week PoC up to embedded multi-quarter R&amp;D leadership.<\u002Fp>\n\n    <div class=\"feature-grid\">\n      <div class=\"feature-card b1\">\n        <div class=\"feature-card-img\">\n          <svg viewBox=\"0 0 600 340\" xmlns=\"http://www.w3.org/2000/svg\">\n            <rect width=\"600\" height=\"340\" fill=\"#c4d6f7\"><\u002Frect>\n            <g transform=\"translate(300 170)\">\n              <rect x=\"-120\" y=\"-60\" width=\"240\" height=\"120\" rx=\"10\" fill=\"#ffffff\"><\u002Frect>\n              <circle cx=\"-80\" cy=\"-20\" r=\"12\" fill=\"#1a73e8\" opacity=\"0.3\"><\u002Fcircle>\n              <circle cx=\"-40\" cy=\"20\" r=\"14\" fill=\"#1a73e8\" opacity=\"0.5\"><\u002Fcircle>\n              <circle cx=\"0\" cy=\"-10\" r=\"16\" fill=\"#1a73e8\" opacity=\"0.7\"><\u002Fcircle>\n              <circle cx=\"40\" cy=\"25\" r=\"18\" fill=\"#1a73e8\" opacity=\"0.85\"><\u002Fcircle>\n              <circle cx=\"80\" cy=\"-15\" r=\"20\" fill=\"#1a73e8\"><\u002Fcircle>\n              <rect x=\"-100\" y=\"-45\" width=\"60\" height=\"6\" rx=\"2\" fill=\"#202124\"><\u002Frect>\n              <rect x=\"-100\" y=\"-35\" width=\"40\" height=\"3\" rx=\"1\" fill=\"#5f6368\"><\u002Frect>\n            <\u002Fg>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"feature-card-body\">\n          <h3 class=\"feature-card-title\">Computer Vision Systems<\u002Fh3>\n          <p class=\"feature-card-desc\">End-to-end CV system design — detection, tracking, segmentation, monocular depth, and sensor fusion. From dataset to edge deployment.<
